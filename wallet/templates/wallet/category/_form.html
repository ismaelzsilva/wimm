<form method="post"
      hx-post="{% if category %}{% url 'category_update' category.uuid %}{% else %}{% url 'category_create' %}{% endif %}"
      hx-target="body">
    {% csrf_token %}
    <h3 class="text-lg font-bold mb-4">{% if category %}Edit Category{% else %}New Category{% endif %}</h3>
    <div class="form-control">
        <label class="label" for="name"><span class="label-text">Name</span></label>
        <input type="text" name="name" id="name" class="input input-bordered"
               value="{{ category.name|default:'' }}" required autofocus>
    </div>
    {% if error %}
    <div class="alert alert-error mt-4 text-sm">{{ error }}</div>
    {% endif %}
    <div class="modal-action">
        <button type="submit" class="btn btn-primary">Save</button>
        <button type="button" class="btn" onclick="document.getElementById('modal').close()">Cancel</button>
    </div>
</form>
