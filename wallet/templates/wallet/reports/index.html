{% extends "wallet/base.html" %}

{% block title %}Reports{% endblock %}

{% block content %}
<div class="flex flex-col gap-6">
    <h1 class="text-3xl font-bold">Reports</h1>

    <div class="card bg-base-100 shadow-sm">
        <div class="card-body">
            <form class="flex flex-wrap gap-4 items-end"
                  hx-get="{% url 'reports_index' %}"
                  hx-target="#report-results"
                  hx-swap="innerHTML"
                  hx-trigger="change">
                <div class="form-control">
                    <label class="label" for="wallet"><span class="label-text">Wallet</span></label>
                    <select name="wallet" id="wallet" class="select select-bordered">
                        <option value="">Select a wallet</option>
                        {% for w in wallets %}
                        <option value="{{ w.uuid }}" {% if selected_wallet == w %}selected{% endif %}>{{ w.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-control">
                    <label class="label" for="year"><span class="label-text">Year</span></label>
                    <select name="year" id="year" class="select select-bordered">
                        <option value="2024" {% if request.GET.year == '2024' %}selected{% endif %}>2024</option>
                        <option value="2025" {% if request.GET.year == '2025' or not request.GET.year %}selected{% endif %}>2025</option>
                        <option value="2026" {% if request.GET.year == '2026' %}selected{% endif %}>2026</option>
                    </select>
                </div>
                <div class="form-control">
                    <label class="label" for="month"><span class="label-text">Month</span></label>
                    <select name="month" id="month" class="select select-bordered">
                        {% for m in months %}
                        <option value="{{ m }}" {% if request.GET.month == m|stringformat:"s" or not request.GET.month and m == now.month %}selected{% endif %}>{{ m }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">View</button>
            </form>
        </div>
    </div>

    <div id="report-results">
        {% if monthly_summary %}
            {% include "wallet/reports/_monthly_summary.html" %}
        {% endif %}
        {% if spending %}
            {% include "wallet/reports/_spending.html" %}
        {% endif %}
    </div>
</div>
{% endblock %}
