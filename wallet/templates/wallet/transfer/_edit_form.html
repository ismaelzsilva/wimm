<form method="post"
      hx-post="{% url 'transfer_update' wallet.uuid transaction.uuid %}"
      hx-target="body">
    {% csrf_token %}
    <h3 class="text-lg font-bold mb-4">Edit Transfer</h3>

    <div class="form-control">
        <label class="label" for="amount"><span class="label-text">Amount</span></label>
        <input type="number" name="amount" id="amount" class="input input-bordered" step="0.01" min="0.01"
               value="{{ transaction.amount|floatformat:2 }}">
    </div>

    <div class="form-control">
        <label class="label" for="date"><span class="label-text">Date</span></label>
        <input type="date" name="date" id="date" class="input input-bordered"
               value="{{ transaction.date|date:'Y-m-d' }}">
    </div>

    <div class="form-control">
        <label class="label" for="description"><span class="label-text">Description</span></label>
        <input type="text" name="description" id="description" class="input input-bordered"
               value="{{ transaction.description|default:'' }}">
    </div>

    {% if error %}
    <div class="alert alert-error mt-4 text-sm">{{ error }}</div>
    {% endif %}

    <div class="modal-action">
        <button type="submit" class="btn btn-primary">Save</button>
        <button type="button" class="btn" onclick="document.getElementById('modal').close()">Cancel</button>
    </div>
</form>
