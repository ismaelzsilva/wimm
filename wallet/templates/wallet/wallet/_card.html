<a href="{% url 'wallet_detail' wallet.uuid %}"
   class="card bg-base-100 bg-base-100 border border-base-300 shadow hover:shadow-md transition-shadow">
    <div class="card-body">
        <h2 class="card-title">{{ wallet.name }}</h2>
        <p class="text-2xl font-bold {% if balance < 0 %}text-error{% endif %}">
            ${{ balance|floatformat:2 }}
        </p>
    </div>
</a>
