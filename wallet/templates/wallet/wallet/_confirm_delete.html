<form method="post"
      hx-post="{% url 'wallet_delete' wallet.uuid %}"
      hx-target="body">
    {% csrf_token %}
    <h3 class="text-lg font-bold mb-4">Delete Wallet</h3>
    <p>Are you sure you want to delete <strong>{{ wallet.name }}</strong>?</p>
    <p class="text-sm text-base-content/60 mt-2">This will also delete all transactions in this wallet.</p>
    {% if error %}
    <div class="alert alert-error mt-4 text-sm">{{ error }}</div>
    {% endif %}
    <div class="modal-action">
        <button type="submit" class="btn btn-error">Delete</button>
        <button type="button" class="btn" onclick="document.getElementById('modal').close()">Cancel</button>
    </div>
</form>
