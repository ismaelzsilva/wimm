<form method="post"
      hx-post="{% if wallet %}{% url 'wallet_update' wallet.uuid %}{% else %}{% url 'wallet_create' %}{% endif %}"
      hx-target="body">
    {% csrf_token %}
    <h3 class="text-lg font-bold mb-4">{% if wallet %}Edit Wallet{% else %}New Wallet{% endif %}</h3>
    <div class="form-control">
        <label class="label" for="name"><span class="label-text">Name</span></label>
        <input type="text" name="name" id="name" class="input input-bordered"
               value="{{ wallet.name|default:'' }}" required autofocus>
    </div>
    <div class="form-control mt-2">
        <label class="label cursor-pointer">
            <span class="label-text">Allow negative balance</span>
            <input type="checkbox" name="can_be_negative" class="toggle toggle-primary"
                   {% if wallet.can_be_negative %}checked{% endif %}>
        </label>
    </div>
    {% if error %}
    <div class="alert alert-error mt-4 text-sm">{{ error }}</div>
    {% endif %}
    <div class="modal-action">
        <button type="submit" class="btn btn-primary">Save</button>
        <button type="button" class="btn" onclick="document.getElementById('modal').close()">Cancel</button>
    </div>
</form>
