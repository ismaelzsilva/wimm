{% extends "wallet/base.html" %}

{% block title %}{{ wallet.name }}{% endblock %}

{% block content %}
    <div class="flex flex-col gap-6">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold">{{ wallet.name }}</h1>
            </div>
        </div>

        <div id="wallet-content">
            {% include "wallet/wallet/_content.html" %}
        </div>
    </div>

    <dialog id="modal" class="modal">
        <div class="modal-box" id="modal-content"></div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <div class="flex flex-col gap-6 mt-6">
        <div class="flex items-center justify-between">
            <div class="flex gap-2">
                <a href="{% url 'wallet_update' wallet.uuid %}" class="btn btn-outline btn-sm"
                   hx-get="{% url 'wallet_update' wallet.uuid %}" hx-target="#modal-content"
                   hx-trigger="click" onclick="document.getElementById('modal').showModal()">
                    Edit
                </a>
                <a href="{% url 'wallet_delete' wallet.uuid %}" class="btn btn-outline btn-error btn-sm"
                   hx-get="{% url 'wallet_delete' wallet.uuid %}" hx-target="#modal-content"
                   hx-trigger="click" onclick="document.getElementById('modal').showModal()">
                    Delete
                </a>
            </div>
        </div>
    </div>
{% endblock %}
