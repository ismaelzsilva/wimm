{% extends "wallet/base.html" %}

{% block title %}{{ wallet.name }}{% endblock %}

{% block content %}
    <div class="flex flex-col gap-6">
        <div class="flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold">{{ wallet.name }}</h1>
            </div>
        </div>

        <div id="wallet-content">
            {% include "wallet/wallet/_content.html" %}
        </div>
    </div>

    <dialog id="wallet-modal" class="modal">
        <div class="modal-box" id="wallet-modal-content">
            {% include "wallet/wallet/_form.html" %}
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <dialog id="wallet-delete-modal" class="modal">
        <div class="modal-box">
            {% include "wallet/wallet/_confirm_delete.html" %}
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <dialog id="transaction-modal" class="modal">
        <div class="modal-box" id="transaction-modal-content"></div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <div class="flex flex-col gap-6 mt-6">
        <div class="flex items-center justify-between">
            <div class="flex gap-2">
                <button class="btn btn-outline btn-sm"
                        onclick="document.getElementById('wallet-modal').showModal()">
                    Edit
                </button>
                <button class="btn btn-outline btn-error btn-sm"
                        onclick="document.getElementById('wallet-delete-modal').showModal()">
                    Delete
                </button>
            </div>
        </div>
    </div>
{% endblock %}
