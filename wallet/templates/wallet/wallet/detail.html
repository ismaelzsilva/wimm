{% extends "wallet/base.html" %}

{% block title %}{{ wallet.name }}{% endblock %}

{% block content %}
<div class="flex flex-col gap-6">
    <div class="flex items-center justify-between">
        <div>
            <a href="{% url 'wallet_list' %}" class="link link-neutral text-sm">&larr; Back to wallets</a>
            <h1 class="text-3xl font-bold mt-1">{{ wallet.name }}</h1>
        </div>
        <div class="flex gap-2">
            <a href="{% url 'wallet_update' wallet.uuid %}" class="btn btn-outline btn-sm"
               hx-get="{% url 'wallet_update' wallet.uuid %}" hx-target="#modal-content"
               hx-trigger="click" onclick="document.getElementById('modal').showModal()">
                Edit
            </a>
            <a href="{% url 'wallet_delete' wallet.uuid %}" class="btn btn-outline btn-error btn-sm"
               hx-get="{% url 'wallet_delete' wallet.uuid %}" hx-target="#modal-content"
               hx-trigger="click" onclick="document.getElementById('modal').showModal()">
                Delete
            </a>
        </div>
    </div>

    <div class="stats shadow">
        <div class="stat">
            <div class="stat-title">Balance</div>
            <div class="stat-value {% if balance < 0 %}text-error{% endif %}">
                ${{ balance|floatformat:2 }}
            </div>
        </div>
    </div>

    <div class="flex flex-wrap gap-2 items-center">
        <a href="{% url 'transaction_create' wallet.uuid %}?type=income"
           class="btn btn-success btn-sm"
           hx-get="{% url 'transaction_create' wallet.uuid %}?type=income"
           hx-target="#modal-content" hx-trigger="click"
           onclick="document.getElementById('modal').showModal()">
            + Income
        </a>
        <a href="{% url 'transaction_create' wallet.uuid %}?type=expense"
           class="btn btn-error btn-sm"
           hx-get="{% url 'transaction_create' wallet.uuid %}?type=expense"
           hx-target="#modal-content" hx-trigger="click"
           onclick="document.getElementById('modal').showModal()">
            + Expense
        </a>
    </div>

    <div id="transaction-list">
        {% include "wallet/transaction/_list.html" %}
    </div>
</div>

<dialog id="modal" class="modal">
    <div class="modal-box" id="modal-content"></div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>
{% endblock %}
